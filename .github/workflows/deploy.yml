name: Deploy to Hetzner
on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Build & Sync Files
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔐 Create environment file
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          printf 'export const environment = {\n  production: true,\n  supabaseUrl: "%s",\n  supabaseAnonKey: "%s"\n};\n' \
            "$SUPABASE_URL" "$SUPABASE_ANON_KEY" > src/environments/environment.ts

      - name: 🏗️ Build Angular app
        run: npm run build

      - name: 🔍 Show dist output
        run: find dist -type d

      - name: 📂 Sync files to Hetzner
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./dist/poll-app/browser/
          server-dir: /public_html/pollapp/
