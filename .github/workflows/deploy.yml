name: Deploy to Hetzner
on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Build & Sync Files
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔐 Create environment file
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          printf 'export const environment = {\n  production: true,\n  supabaseUrl: "%s",\n  supabaseAnonKey: "%s"\n};\n' \
            "$SUPABASE_URL" "$SUPABASE_ANON_KEY" > src/environments/environment.ts

      - name: 🏗️ Build Angular app
        run: npm run build

      - name: 🔍 Show dist output
        run: find dist -type d

      - name: 📂 Deploy via FTPS (lftp)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get install -y lftp
          lftp -d -e "
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ssl:verify-certificate false;
            set ftp:passive-mode true;
            open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER;
            lcd ./dist/pollApp/browser/;
            mirror -R --verbose --delete . /pollapp/;
            bye
          "
